<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stories — Grace Architects PLLC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />

  <style>
    main { padding: 4rem 2rem; }

    .page {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      text-align: left;
    }

    .page h1 {
      margin: 0;
      font-size: 2.25rem;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    .lead {
      margin-top: 0.75rem;
      color: var(--muted);
      max-width: 900px;
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .stories-grid {
  margin: 2.5rem auto 0;   /* center it */
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 18px;

  max-width: 750px;        /* cap width */
  width: 100%;             /* responsive until cap */
}

 .story-tile {
  position: relative;
  aspect-ratio: 1 / 1;
  border: 1px solid #eee;
  border-radius: 0;
  overflow: hidden;
  text-decoration: none;
  color: #fff;
  display: block;
}

.story-tile img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;

  /* Black & white by default */
  filter: grayscale(100%);
  transition: filter 300ms ease, transform 300ms ease;
}

/* Dark overlay for white title legibility */
.story-tile::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.35);
  transition: background 300ms ease;
}

.story-tile .tile-title {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  text-align: center;
  padding: 1.25rem;
  font-weight: 500;
  letter-spacing: 0.03em;
  z-index: 1;
  color: #ffffff;
}

/* Hover = full color */
.story-tile:hover img {
  filter: grayscale(25%);
  transform: scale(1.03);
}

.story-tile:hover::after {
  background: rgba(0, 0, 0, 0.2);
}

    @media (max-width: 950px) {
      .stories-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 560px) {
      .stories-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
